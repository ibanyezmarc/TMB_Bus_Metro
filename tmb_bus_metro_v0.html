<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TMB Bus / Metro</title>
<style>
:root {
  --bg: #08101f; --panel:#111c33; --panel2:#16233d; --text:#e8eefc; --muted:#9bb0d6; --accent:#7cc5ff;
  --good:#2ecc71; --bad:#ff6b6b; --chip:#0d1630; --border:rgba(255,255,255,.1);
}
* { box-sizing:border-box; }
body { margin:0; font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif; background:linear-gradient(180deg,#06101d,#0d1730); color:var(--text); }
.wrap { max-width:760px; margin:0 auto; padding:18px; }
h1 { margin:0 0 4px; font-size:1.45rem; }
.sub { color:var(--muted); margin-bottom:14px; }
.card { background:rgba(17,28,51,.95); border:1px solid var(--border); border-radius:18px; padding:14px; margin-bottom:12px; box-shadow:0 8px 24px rgba(0,0,0,.25); }
.row { display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
.seg { display:flex; background:var(--chip); border-radius:14px; padding:4px; gap:4px; }
.seg button { border:none; padding:10px 14px; border-radius:10px; background:transparent; color:var(--text); font-weight:700; }
.seg button.active { background:var(--accent); color:#08233a; }
input, button.action { border:none; border-radius:12px; padding:12px 14px; font-size:1rem; }
input { flex:1; min-width:200px; background:#091327; color:var(--text); border:1px solid var(--border); }
button.action { background:var(--accent); color:#08233a; font-weight:800; }
button.action.secondary { background:#091327; color:var(--text); border:1px solid var(--border); }
.muted { color:var(--muted); }
.hidden { display:none !important; }
.status.good { color:#c8f7d7; }
.status.bad { color:#ffd0d0; }
.selected { font-weight:700; }
.meta { display:flex; gap:10px; flex-wrap:wrap; color:var(--muted); font-size:.95rem; margin-top:8px; }
.badge { background:var(--chip); border:1px solid var(--border); border-radius:999px; padding:7px 10px; }
.results button {
  width:100%; text-align:left; background:var(--panel2); color:var(--text); border:1px solid var(--border);
  border-radius:14px; padding:12px; margin-top:8px;
}
.results button small { display:block; color:var(--muted); margin-top:4px; }
.results button.sel { outline:2px solid var(--accent); }
.line-card { background:var(--panel2); border:1px solid var(--border); border-radius:16px; padding:12px; margin-top:10px; }
.line-head { display:flex; align-items:center; gap:8px; font-weight:800; margin-bottom:8px; }
.dot { width:14px; height:14px; border-radius:50%; border:2px solid rgba(255,255,255,.5); display:inline-block; }
.dest { font-weight:700; margin:8px 0 6px; }
.pills { display:flex; gap:8px; flex-wrap:wrap; }
.pill { min-width:102px; padding:10px; background:#091327; border-radius:14px; border:1px solid var(--border); text-align:center; }
.timeleft { font-size:1.25rem; font-weight:900; }
.footer { color:var(--muted); font-size:.88rem; margin-top:8px; }
</style>
</head>

<div class="wrap">

        <button id="btnMetro" type="button">Metro</button>

      <input id="searchInput" type="text" placeholder="Busca una parada o estación" />
      <button id="searchBtn" class="action" type="button">Buscar</button>
      <button id="toggleResultsBtn" class="action secondary hidden" type="button">Mostrar lista</button>
      <button id="clearBtn" class="action secondary" type="button">Limpiar</button>
    </div>
    <div class="meta">

    </div>
  </div>

  <div id="searchResults" class="results"></div>

  <div id="timesResults"></div>
</div>

let currentTransport = 'bus';
let selectedStop = null;
let nextRefreshIn = REFRESH_SECONDS;
let refreshTimer = null;
let secondTimer = null;
let isLoading = false;
let resultsCollapsed = false;

const btnBus = document.getElementById('btnBus');
const btnMetro = document.getElementById('btnMetro');
const searchInput = document.getElementById('searchInput');
const searchBtn = document.getElementById('searchBtn');
const toggleResultsBtn = document.getElementById('toggleResultsBtn');
const clearBtn = document.getElementById('clearBtn');
const searchStatus = document.getElementById('searchStatus');
const searchResults = document.getElementById('searchResults');
const timesStatus = document.getElementById('timesStatus');
const timesResults = document.getElementById('timesResults');
const selectedLabel = document.getElementById('selectedLabel');
const refreshCountdown = document.getElementById('refreshCountdown');

function setTransport(kind) {
  currentTransport = kind;
  btnBus.classList.toggle('active', kind === 'bus');
  btnMetro.classList.toggle('active', kind === 'metro');
  selectedStop = null;
  selectedLabel.textContent = 'ninguna';
  timesResults.innerHTML = '';
  timesStatus.className = 'card muted';
  timesStatus.textContent = 'Selecciona una parada para ver tiempos.';
  doSearch();
}

function normalize(s) {
  return (s || '')
    .toLowerCase()
    .normalize('NFD')
    .replace(/[\u0300-\u036f]/g, '');
}

function fmtClock(ms) {
  return new Date(ms).toLocaleTimeString('es-ES', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
}

function remaining(ms) {
  const sec = Math.max(0, Math.floor((ms - Date.now()) / 1000));
  return { sec, min: Math.floor(sec/60), rem: sec % 60 };
}

function stopLabel(stop) {
  return `${stop.name}`;
}

function updateResultsVisibility() {
  const hasQuery = !!searchInput.value.trim();
  const showToggle = hasQuery || !!selectedStop;
  toggleResultsBtn.classList.toggle('hidden', !showToggle);
  toggleResultsBtn.textContent = resultsCollapsed ? 'Mostrar lista' : 'Ocultar lista';
  searchResults.classList.toggle('hidden', resultsCollapsed);
}

function setResultsCollapsed(collapsed) {
  resultsCollapsed = collapsed;
  updateResultsVisibility();
}

function setSearchMessage(msg, cls='muted') {
  searchStatus.className = `card ${cls}`;
  searchStatus.textContent = msg;
}

function setTimesMessage(msg, cls='muted') {
  timesStatus.className = `card ${cls}`;
  timesStatus.textContent = msg;
}

function doSearch(forceExpand = false) {
  const q = normalize(searchInput.value.trim());
  const items = STOPS.filter(s => s.transport === currentTransport);
  let filtered = items;
  if (q) {
    filtered = items.filter(s =>
      normalize(s.name).includes(q) ||
      normalize(s.code).includes(q)
    );
  }
  filtered = filtered.slice(0, 80);
  if (forceExpand) {
    resultsCollapsed = false;
  }
  renderSearchResults(filtered, q);
  updateResultsVisibility();
}

function renderSearchResults(list, q) {
  searchResults.innerHTML = '';
  if (!q) {
    setSearchMessage(`Hay ${STOPS.filter(s => s.transport===currentTransport).length} paradas de ${currentTransport}. Escribe para filtrar.`);
    updateResultsVisibility();
    return;
  }
  if (resultsCollapsed) {
    setSearchMessage(`${list.length} resultados para "${searchInput.value.trim()}" (lista plegada)`, 'good');
  }
  if (!list.length) {
    setSearchMessage('Sin resultados', 'bad');
    updateResultsVisibility();
    return;
  }
  if (!resultsCollapsed) {
    setSearchMessage(`${list.length} resultados para "${searchInput.value.trim()}"`, 'good');
  }
  for (const stop of list) {
    const btn = document.createElement('button');
    if (selectedStop && selectedStop.id === stop.id) btn.classList.add('sel');
    btn.innerHTML = `<strong>${stop.name}</strong><small>Código API: ${stop.code} · ${stop.transport} · ${stop.id}</small>`;
    btn.onclick = () => selectStop(stop);
    searchResults.appendChild(btn);
  }
}

function selectStop(stop) {
  selectedStop = stop;
  selectedLabel.textContent = `${stop.name} (${stop.code})`;
  nextRefreshIn = REFRESH_SECONDS;
  refreshCountdown.textContent = nextRefreshIn;
  setResultsCollapsed(true);
  doSearch();
  loadTimes();
}

function buildUrl(stop) {
  if (stop.transport === 'metro') {
    return `https://api.tmb.cat/v1/itransit/metro/estacions?estacions=${encodeURIComponent(stop.code)}&app_id=${APP_ID}&app_key=${APP_KEY}`;
  }
  return `https://api.tmb.cat/v1/itransit/bus/parades/${encodeURIComponent(stop.code)}?app_id=${APP_ID}&app_key=${APP_KEY}`;
}

function safeArray(v) {
  return Array.isArray(v) ? v : [];
}

function parseMetro(data) {
  const out = [];
  for (const linea of safeArray(data.linies)) {
    for (const est of safeArray(linea.estacions)) {
      for (const tray of safeArray(est.linies_trajectes)) {
        out.push({
          lineName: tray.nom_linia || linea.nom_linia || '',
          lineColor: tray.color_linia || linea.color_linia || '999999',
          dest: tray.desti_trajecte || '',
          direction: est.id_sentit ? `Sentido ${est.id_sentit}` : '',
          arrivals: safeArray(tray.propers_trens).map(t => ({
            arrival: t.temps_arribada,
            label: 'tren'
          }))
        });
      }
    }
  }
  return out;
}

function parseBus(data) {
  const out = [];
  for (const parada of safeArray(data.parades)) {
    for (const tray of safeArray(parada.linies_trajectes)) {
      out.push({
        lineName: tray.nom_linia || tray.codi_linia || '',
        lineColor: tray.color_linia || '0ea5e9',
        dest: tray.desti_trajecte || '',
        direction: tray.id_sentit ? `Sentido ${tray.id_sentit}` : '',
        arrivals: safeArray(tray.propers_busos).map(b => ({
          arrival: b.temps_arribada,
          label: 'bus'
        }))
      });
    }
  }
  return out;
}

function renderTimes(groups) {
  timesResults.innerHTML = '';
  if (!groups.length) {
    setTimesMessage('Sin tiempos disponibles para esta parada.', 'bad');
    return;
  }
  setTimesMessage(`Actualizado a las ${fmtClock(Date.now())}`, 'good');
  for (const g of groups) {
    const wrap = document.createElement('div');
    wrap.className = 'line-card';
    const color = ('#' + (g.lineColor || '999999')).replace('##','#');
    const arrivalsHtml = g.arrivals.length
      ? g.arrivals.map(a => {
          const r = remaining(a.arrival);
          return `<div class="pill" data-arrival="${a.arrival}"><div class="timeleft">${r.min}m ${String(r.rem).padStart(2,'0')}s</div><div>${fmtClock(a.arrival)}</div><div class="muted">${a.label}</div></div>`;
        }).join('')
      : '<div class="muted">Sin próximos pasos</div>';
    wrap.innerHTML = `
      <div class="line-head"><span class="dot" style="background:${color}"></span><span>${g.lineName}</span></div>
      <div class="dest">${g.dest || 'Destino no disponible'}</div>
      <div class="muted">${g.direction || ''}</div>
      <div class="pills">${arrivalsHtml}</div>
    `;
    timesResults.appendChild(wrap);
  }
  tickVisibleCountdowns();
}

function tickVisibleCountdowns() {
  document.querySelectorAll('[data-arrival]').forEach(el => {
    const t = Number(el.getAttribute('data-arrival'));
    const r = remaining(t);
    const box = el.querySelector('.timeleft');
    if (box) box.textContent = `${r.min}m ${String(r.rem).padStart(2,'0')}s`;
  });
}

async function loadTimes() {
  if (!selectedStop || isLoading) return;
  isLoading = true;
  setTimesMessage('Consultando API de TMB...');
  try {
    const resp = await fetch(buildUrl(selectedStop), { cache:'no-store' });
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data = await resp.json();
    const groups = selectedStop.transport === 'metro' ? parseMetro(data) : parseBus(data);
    renderTimes(groups);
    nextRefreshIn = REFRESH_SECONDS;
    refreshCountdown.textContent = nextRefreshIn;
  } catch (err) {
    setTimesMessage(`Error al consultar la API: ${err.message}`, 'bad');
  } finally {
    isLoading = false;
  }
}

function startTimers() {
  clearInterval(refreshTimer);
  clearInterval(secondTimer);
  refreshTimer = setInterval(() => {
    if (selectedStop) loadTimes();
  }, REFRESH_SECONDS * 1000);
  secondTimer = setInterval(() => {
    nextRefreshIn = Math.max(0, nextRefreshIn - 1);
    refreshCountdown.textContent = nextRefreshIn;
    tickVisibleCountdowns();
  }, 1000);
}

btnBus.onclick = () => {
  setResultsCollapsed(false);
  setTransport('bus');
};
btnMetro.onclick = () => {
  setResultsCollapsed(false);
  setTransport('metro');
};
searchInput.addEventListener('input', () => doSearch(true));
searchInput.addEventListener('keydown', (ev) => {
  if (ev.key === 'Enter') doSearch(true);
});
searchBtn.onclick = () => doSearch(true);
toggleResultsBtn.onclick = () => setResultsCollapsed(!resultsCollapsed);
clearBtn.onclick = () => {
  searchInput.value = '';
  selectedStop = null;
  selectedLabel.textContent = 'ninguna';
  timesResults.innerHTML = '';
  timesStatus.className = 'card muted';
  timesStatus.textContent = 'Selecciona una parada para ver tiempos.';
  setResultsCollapsed(false);
  doSearch(true);
};

startTimers();
doSearch();
updateResultsVisibility();
</script>
</body>
</html>
